<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Usque → Shadowrocket MASQUE</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header><h1>Usque <b>→</b> Shadowrocket MASQUE</h1><span class="privacy">♢ 100% 本機處理</span></header>
  <main>
    <section class="grid">
      <article class="card upload" id="dropZone" tabindex="0" role="button" aria-label="選擇 Usque JSON 檔案">
        <input id="fileInput" type="file" accept=".json,application/json" hidden>
        <div class="icon">⇧</div><h2>拖放 Usque JSON 檔案到這裡</h2>
        <button id="chooseButton" type="button" class="link-button">或點擊選擇檔案</button><span class="pill">.json</span>
        <div id="fileReady" class="file-ready" hidden><span></span><strong id="fileName"></strong><b>✓</b></div>
        <p id="error" class="error" role="alert"></p>
      </article>
      <article class="card settings">
        <h2>⚙ 設定</h2>
        <div class="form">
          <label for="endpointPreset">IPv4 Endpoint</label>
          <select id="endpointPreset">
            <optgroup label="162.159.198.2">
              <option value="162.159.198.2:443">162.159.198.2:443</option><option value="162.159.198.2:500">162.159.198.2:500</option>
              <option value="162.159.198.2:1701">162.159.198.2:1701</option><option value="162.159.198.2:4500">162.159.198.2:4500</option>
              <option value="162.159.198.2:4443">162.159.198.2:4443</option><option value="162.159.198.2:8443">162.159.198.2:8443</option>
              <option value="162.159.198.2:8095">162.159.198.2:8095</option>
            </optgroup>
            <optgroup label="162.159.199.2">
              <option value="162.159.199.2:443">162.159.199.2:443</option><option value="162.159.199.2:500">162.159.199.2:500</option>
              <option value="162.159.199.2:1701">162.159.199.2:1701</option><option value="162.159.199.2:4500">162.159.199.2:4500</option>
              <option value="162.159.199.2:4443">162.159.199.2:4443</option><option value="162.159.199.2:8443">162.159.199.2:8443</option>
              <option value="162.159.199.2:8095">162.159.199.2:8095</option>
            </optgroup>
            <optgroup id="jsonEndpointGroup" label="JSON 原始 Endpoint" hidden></optgroup>
          </select>
          <label for="endpoint">IP 位址</label><input id="endpoint" readonly>
          <label for="port">Port</label><input id="port" readonly>
          <label for="tunnelIp">內部 IP</label><input id="tunnelIp" readonly placeholder="載入 JSON 後自動填入">
          <label for="dns">DNS</label><input id="dns" value="1.1.1.1, 1.0.0.1">
          <label for="udp">UDP</label><button id="udp" class="toggle on" role="switch" aria-checked="true"><span></span></button>
          <label for="cc">Congestion Control</label><select id="cc"><option>bbr</option><option>cubic</option><option>reno</option></select>
          <label for="flag">Flag</label><input id="flag" value="CDN">
          <label for="name">Name</label><input id="name" value="WARP-MASQUE">
        </div>
      </article>
    </section>
    <section class="card output">
      <div class="output-head"><div><h2>Shadowrocket MASQUE URL</h2><p id="hint">載入有效的 Usque JSON 後，URL 會在這裡產生。</p></div><span id="status">等待檔案</span></div>
      <div class="url-row"><code id="result">masque://…</code><button id="copyButton" disabled>▣<br><strong>複製 URL</strong></button></div>
    </section>
    <p class="note">檔案內容不會上傳或離開你的瀏覽器。URL 包含私人金鑰，請妥善保管。</p>
  </main>
  <script src="script.js"></script>
</body>
</html>
